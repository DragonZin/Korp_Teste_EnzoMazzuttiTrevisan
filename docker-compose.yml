services:
  postgres-produtos:
    image: postgres:16
    container_name: db_produtos
    environment:
      POSTGRES_USER: produtos
      POSTGRES_PASSWORD: produtos
      POSTGRES_DB: produtos
    ports:
      - "5433:5432"
    volumes:
      - postgres_produtos_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U produtos -d produtos"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-nota_fiscal:
    image: postgres:16
    container_name: db_nota_fiscal
    environment:
      POSTGRES_USER: nota_fiscal
      POSTGRES_PASSWORD: nota_fiscal
      POSTGRES_DB: nota_fiscal
    ports:
      - "5434:5432"
    volumes:
      - postgres_nota_fiscal_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nota_fiscal -d nota_fiscal"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-product:
    build:
      context: .
      dockerfile: ApiProduct/Dockerfile
    container_name: api_product
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres-produtos;Port=5432;Database=produtos;Username=produtos;Password=produtos
    depends_on:
      postgres-produtos:
        condition: service_healthy
    ports:
      - "8080"

  api-invoice:
    build:
      context: .
      dockerfile: ApiInvoice/Dockerfile
    container_name: api_invoice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres-nota_fiscal;Port=5432;Database=nota_fiscal;Username=nota_fiscal;Password=nota_fiscal
      ProductApi__BaseUrl: http://api-product:8080/
    depends_on:
      postgres-nota_fiscal:
        condition: service_healthy
      api-product:
        condition: service_started
    ports:
      - "8080"

  api-gateway:
    image: nginx:1.27-alpine
    container_name: api_gateway
    volumes:
      - ./Gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-product
      - api-invoice
    ports:
      - "8080:8080"

volumes:
  postgres_produtos_data:
  postgres_nota_fiscal_data: