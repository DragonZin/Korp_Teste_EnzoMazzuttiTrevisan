<section class="card border-0 shadow-sm">
    <div class="card-body">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
        <h2 class="h5 mb-1">Notas fiscais</h2>
        <p class="text-body-secondary mb-0">Listagem de notas.</p>
        </div>
        <div class="d-flex align-items-center gap-2">
        <button type="button" class="btn btn-outline-secondary" (click)="loadInvoices(page())" [disabled]="isLoading()">
            Recarregar
        </button>
        <button type="button" class="btn btn-primary" (click)="openCreateModal()" [disabled]="isLoading()">
            Nova nota
        </button>
        </div>
    </div>

    <div class="d-flex align-items-end gap-2 mb-3">
        <div>
        <label class="form-label mb-1" for="invoice-status">Status</label>
        <select
            id="invoice-status"
            class="form-select"
            [value]="selectedStatus()"
            (change)="onStatusChange($event)"
            [disabled]="isLoading()"

        >
            <option value="">Todos</option>
            <option value="1">Open</option>
            <option value="2">Closed</option>
        </select>
        </div>
    </div>

    <div *ngIf="errorMessage() as error" class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    <div *ngIf="successMessage() as success" class="alert alert-success" role="status">
        {{ success }}
    </div>

    <div
        *ngIf="isLoading()"
        class="d-flex align-items-center gap-2 mb-3 text-body-secondary"
        aria-live="polite"
    >
        <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
        <span>Carregando notas fiscais...</span>
    </div>

    <div class="card border-0 bg-body-tertiary">
      <app-invoices-table
        [invoices]="invoices()"
        [isLoading]="isLoading()"
        [emptyMessage]="'Nenhuma nota encontrada. Ajuste os filtros ou recarregue a lista.'"
        [actionsTemplate]="actionsCellTemplate"
      />
    </div>

    <ng-template #actionsCellTemplate let-invoice>
      <a
        class="btn btn-outline-primary btn-sm"
        [routerLink]="['/invoices', invoice.id]"
        [class.disabled]="isActionInProgress(invoice.id)"
        [attr.aria-disabled]="isActionInProgress(invoice.id)"
      >
        Editar
      </a>
      <button
        type="button"
        class="btn btn-outline-danger btn-sm"
        (click)="requestDeleteInvoice(invoice)"
        [disabled]="isActionInProgress(invoice.id)"
      >
        {{ deletingInvoiceId() === invoice.id ? 'Excluindo...' : 'Excluir' }}
      </button>
      <button
        type="button"
        class="btn btn-outline-success btn-sm"
        (click)="closeInvoice(invoice)"
        [disabled]="invoice.status === 2 || isActionInProgress(invoice.id)"
      >
        {{ closingInvoiceId() === invoice.id ? 'Fechando...' : 'Fechar nota' }}
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary btn-sm"
        [disabled]="isActionInProgress(invoice.id)"
        (click)="printInvoice(invoice)"
        aria-label="Imprimir nota fiscal"
      >
        Imprimir
      </button>
    </ng-template>

    <app-pagination-controls
        [currentItemCount]="invoices().length"
        [totalItems]="totalItems()"
        [page]="page()"
        [totalPages]="totalPages()"
        [pageSize]="pageSize()"
        [pageSizeOptions]="pageSizeOptions"
        [isLoading]="isLoading()"
        pageSizeId="invoices-page-size"
        ariaLabel="Paginação das notas"
        (previous)="previousPage()"
        (next)="nextPage()"
        (pageSizeChange)="onPageSizeChange($event)"
    />
    </div>
</section>
<app-base-modal
    [isOpen]="isCreateModalOpen()"
    title="Nova nota fiscal"
    subtitle="Preencha os dados do cliente para criar a nota."
    size="md"
    [closeOnBackdropClick]="!isCreatingInvoice()"
    (closed)="closeCreateModal()"
>
<app-invoice-form
    [isSubmitting]="isCreatingInvoice()"
    [apiErrorMessage]="createApiError()"
    [apiFieldErrors]="createFieldErrors()"
    (submitted)="submitCreateInvoice($event)"
    (cancelled)="closeCreateModal()"
/>
</app-base-modal>

<app-confirmation-modal
    [isOpen]="isDeleteConfirmModalOpen()"
    title="Confirmar exclusão da nota"
    subtitle="Esta ação remove a nota fiscal permanentemente."
    message="Deseja realmente excluir a nota"
    [emphasisText]="getDeleteInvoiceLabel()"
    confirmLabel="Confirmar exclusão"
    processingLabel="Excluindo..."
    [isProcessing]="!!deletingInvoiceId()"
    (cancelled)="closeDeleteModal()"
    (confirmed)="confirmDeleteInvoice()"
></app-confirmation-modal>
