<div class="min-vh-100 bg-body-tertiary">
  <header class="border-bottom bg-white shadow-sm">
    <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-3">
      <div>
        <h1 class="h4 mb-0">Gestão Comercial</h1>
        <small class="text-body-secondary">Produtos e notas fiscais</small>
      </div>

      <div class="d-flex align-items-center ms-auto gap-3 w-100 justify-content-end">
        <nav class="nav nav-pills flex-wrap justify-content-end" aria-label="Menu principal">
          <a
            class="nav-link"
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Início
          </a>
          <a
            class="nav-link"
            routerLink="/products"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Produtos
          </a>
          <a
            class="nav-link"
            routerLink="/invoices"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Notas
          </a>
        </nav>

        <app-health-indicator />
      </div>
    </div>
  </header>

  <main class="container py-4">
    <router-outlet />
  </main>
</div>
